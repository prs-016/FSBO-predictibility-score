services:
  - type: web
    name: fsbo-live-predictor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DVW_PATH
        value: /tmp/live.dvw
      - key: MODEL_DIR
        value: ./models
        # Directory of per-team bundle .pkl files (relative to repo root).
        # All 41 trained bundles are committed under models/ — no extra setup needed.
      - key: TEAM_ID
        value: "1378"
        # 1378 = UC San Diego. Change to any exported team_id to switch scouting target.
        # Full list of available team_ids in models/manifest.json
