services:
  - type: web
    name: fsbo-live-predictor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DVW_PATH
        value: /tmp/live.dvw
      - key: MODEL_DIR
        value: ./models
      - key: TEAM_ID
        value: "1378"
